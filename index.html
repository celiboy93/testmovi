<!doctype html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Demo | Cloudflare Pages</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
    }
    .sub {
      color: #94a3b8;
      margin-top: 6px;
      font-size: 14px;
    }
    .search {
      width: 320px;
      max-width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #111827;
      color: #fff;
      outline: none;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 18px;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: #3b82f6;
    }
    .poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      display: block;
      background: #1f2937;
    }
    .card-body {
      padding: 12px;
    }
    .movie-name {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
      margin: 0 0 6px;
      color: #f8fafc;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 42px;
    }
    .small {
      color: #94a3b8;
      font-size: 13px;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 999;
    }
    .modal.show {
      display: flex;
    }
    .modal-box {
      width: 100%;
      max-width: 820px;
      background: #0b1220;
      border: 1px solid #1e293b;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    .modal-content {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 18px;
      padding: 18px;
    }
    .modal-poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 14px;
      background: #1f2937;
    }
    .modal-title {
      margin: 0 0 10px;
      font-size: 24px;
      color: #fff;
    }
    .desc {
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 15px;
      margin-bottom: 16px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-secondary {
      background: transparent;
      color: #e5e7eb;
      border-color: #334155;
    }
    .close {
      position: absolute;
      top: 18px;
      right: 18px;
      border: 0;
      background: #111827;
      color: #fff;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }
    .empty {
      text-align: center;
      color: #94a3b8;
      padding: 30px 10px;
      display: none;
    }
    @media (max-width: 720px) {
      .modal-content {
        grid-template-columns: 1fr;
      }
      .modal-poster {
        max-width: 220px;
      }
      .modal-poster-wrap {
        display: flex;
        justify-content: center;
      }
      .title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1 class="title">Movie Demo Website</h1>
        <div class="sub">Cloudflare Pages အတွက် static movie web demo</div>
      </div>
      <input id="searchInput" class="search" type="text" placeholder="Search movie title..." />
    </div><div id="movieGrid" class="grid"></div>
<div id="emptyState" class="empty">No movies found.</div>

  </div>  <div id="modal" class="modal">
    <button id="closeBtn" class="close">×</button>
    <div class="modal-box">
      <div class="modal-content">
        <div class="modal-poster-wrap">
          <img id="modalPoster" class="modal-poster" src="" alt="poster" />
        </div>
        <div>
          <h2 id="modalTitle" class="modal-title"></h2>
          <div id="modalMeta" class="small" style="margin-bottom:10px"></div>
          <div id="modalDesc" class="desc"></div>
          <div class="actions">
            <a id="streamBtn" class="btn btn-primary" href="#" target="_blank" rel="noopener noreferrer">Watch Stream</a>
            <a id="downloadBtn" class="btn btn-secondary" href="#" target="_blank" rel="noopener noreferrer">Download</a>
          </div>
        </div>
      </div>
    </div>
  </div>  <script>
    const movies = [
      {
        id: 1,
        title: 'Avengers: Endgame',
        year: '2019',
        genre: 'Action / Sci-Fi',
        poster: 'https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg',
        description: 'The Avengers gather once again to reverse the damage caused by Thanos and bring back the vanished half of the universe.',
        stream: 'https://example.com/stream/endgame',
        download: 'https://example.com/download/endgame'
      },
      {
        id: 2,
        title: 'John Wick Chapter 4',
        year: '2023',
        genre: 'Action / Crime',
        poster: 'https://image.tmdb.org/t/p/w500/vZloFAK7NmvMGKE7VkF5UHaz0I.jpg',
        description: 'John Wick discovers a path to defeating the High Table, but powerful enemies stand between him and freedom.',
        stream: 'https://example.com/stream/johnwick4',
        download: 'https://example.com/download/johnwick4'
      },
      {
        id: 3,
        title: 'Interstellar',
        year: '2014',
        genre: 'Adventure / Drama / Sci-Fi',
        poster: 'https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg',
        description: 'A team of explorers travels through a wormhole in space in an attempt to ensure humanity’s survival.',
        stream: 'https://example.com/stream/interstellar',
        download: 'https://example.com/download/interstellar'
      },
      {
        id: 4,
        title: 'The Batman',
        year: '2022',
        genre: 'Action / Mystery',
        poster: 'https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg',
        description: 'Batman ventures into Gotham City’s underworld when a sadistic killer leaves behind a trail of cryptic clues.',
        stream: 'https://example.com/stream/thebatman',
        download: 'https://example.com/download/thebatman'
      }
    ];

    const movieGrid = document.getElementById('movieGrid');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');

    const modal = document.getElementById('modal');
    const closeBtn = document.getElementById('closeBtn');
    const modalPoster = document.getElementById('modalPoster');
    const modalTitle = document.getElementById('modalTitle');
    const modalMeta = document.getElementById('modalMeta');
    const modalDesc = document.getElementById('modalDesc');
    const streamBtn = document.getElementById('streamBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    function renderMovies(list) {
      movieGrid.innerHTML = '';

      if (!list.length) {
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      list.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img class="poster" src="${movie.poster}" alt="${movie.title}">
          <div class="card-body">
            <h3 class="movie-name">${movie.title}</h3>
            <div class="small">${movie.year} • ${movie.genre}</div>
          </div>
        `;
        card.addEventListener('click', () => openMovie(movie));
        movieGrid.appendChild(card);
      });
    }

    function openMovie(movie) {
      modalPoster.src = movie.poster;
      modalPoster.alt = movie.title;
      modalTitle.textContent = movie.title;
      modalMeta.textContent = `${movie.year} • ${movie.genre}`;
      modalDesc.textContent = movie.description;
      streamBtn.href = movie.stream;
      downloadBtn.href = movie.download || movie.stream;
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeMovie() {
      modal.classList.remove('show');
      document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', closeMovie);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeMovie();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeMovie();
    });

    searchInput.addEventListener('input', () => {
      const keyword = searchInput.value.trim().toLowerCase();
      const filtered = movies.filter(movie =>
        movie.title.toLowerCase().includes(keyword)
      );
      renderMovies(filtered);
    });

    renderMovies(movies);
  </script></body>
</html>
