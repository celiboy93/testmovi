<!doctype html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Detail Style Demo</title>
  <style>
    * { box-sizing: border-box; }:root {
  --bg: #f2f2f2;
  --card: #ffffff;
  --text: #181818;
  --muted: #8a8a8a;
  --red: #ef1717;
  --red-dark: #d60f0f;
  --border: #e8e8e8;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

a { color: inherit; }

.app {
  min-height: 100vh;
  background: var(--bg);
}

.screen {
  display: none;
  min-height: 100vh;
}

.screen.active {
  display: block;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  height: 72px;
  background: var(--red);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.12);
}

.topbar-left,
.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 72px;
}

.topbar-title {
  flex: 1;
  text-align: center;
  font-size: 20px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 10px;
}

.icon-btn {
  border: 0;
  background: transparent;
  color: inherit;
  padding: 6px;
  margin: 0;
  cursor: pointer;
  font-size: 26px;
  line-height: 1;
}

.home-wrap {
  padding: 16px;
}

.search {
  width: 100%;
  height: 48px;
  border-radius: 14px;
  border: 1px solid #ffd2d2;
  padding: 0 14px;
  font-size: 16px;
  outline: none;
  background: #fff;
  color: #111;
  margin-bottom: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.card {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 18px rgba(0,0,0,.06);
  cursor: pointer;
  border: 1px solid #eee;
}

.card img {
  width: 100%;
  aspect-ratio: 2 / 3;
  object-fit: cover;
  display: block;
  background: #ececec;
}

.card-body {
  padding: 10px;
}

.card-title {
  margin: 0;
  font-size: 13px;
  line-height: 1.35;
  min-height: 35px;
  font-weight: 700;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-meta {
  margin-top: 6px;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.45;
}

.empty {
  text-align: center;
  color: #666;
  padding: 48px 16px;
  display: none;
}

.hero {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #ddd;
  overflow: hidden;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.play-overlay {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 72px;
  height: 72px;
  border-radius: 999px;
  border: 0;
  background: rgba(255,255,255,.22);
  backdrop-filter: blur(4px);
  color: #fff;
  font-size: 28px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.duration-badge {
  position: absolute;
  right: 10px;
  bottom: 10px;
  background: rgba(0,0,0,.7);
  color: #fff;
  padding: 6px 10px;
  font-size: 13px;
  border-radius: 10px;
  font-weight: 700;
}

.detail-card {
  background: var(--card);
  margin-top: -4px;
  border-top-left-radius: 18px;
  border-top-right-radius: 18px;
  min-height: calc(100vh - 220px);
  padding: 18px 18px 28px;
  box-shadow: 0 -2px 10px rgba(0,0,0,.03);
}

.detail-title {
  margin: 0;
  font-size: 30px;
  line-height: 1.2;
  font-weight: 700;
  letter-spacing: -.02em;
}

.detail-meta {
  margin-top: 10px;
  color: var(--muted);
  font-size: 16px;
  line-height: 1.5;
}

.dot {
  margin: 0 8px;
}

.btn-col {
  display: grid;
  gap: 12px;
  margin-top: 18px;
}

.action-btn {
  width: 100%;
  min-height: 58px;
  border: 0;
  border-radius: 16px;
  background: var(--red);
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 18px rgba(239,23,23,.18);
}

.action-btn:active {
  transform: translateY(1px);
  background: var(--red-dark);
}

.desc {
  margin-top: 26px;
  font-size: 16px;
  line-height: 1.9;
  color: #202020;
  white-space: pre-wrap;
  word-break: break-word;
}

.player-sheet {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.82);
  z-index: 50;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.player-sheet.show {
  display: flex;
}

.player-box {
  width: 100%;
  max-width: 980px;
  background: #000;
  border-radius: 18px;
  overflow: hidden;
  position: relative;
}

.player-close {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 5;
  border: 0;
  width: 42px;
  height: 42px;
  border-radius: 999px;
  background: rgba(255,255,255,.16);
  color: #fff;
  font-size: 22px;
  cursor: pointer;
}

video {
  width: 100%;
  aspect-ratio: 16 / 9;
  display: block;
  background: #000;
}

.hint {
  background: #fff6f6;
  border: 1px solid #ffdada;
  color: #7a4545;
  font-size: 13px;
  padding: 10px 12px;
  border-radius: 12px;
  margin-top: 14px;
  line-height: 1.6;
}

@media (min-width: 721px) {
  .home-wrap {
    max-width: 1200px;
    margin: 0 auto;
  }

  .grid {
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }

  .card-title {
    font-size: 15px;
    min-height: 42px;
  }

  .card-meta {
    font-size: 13px;
  }

  .detail-wrap {
    max-width: 980px;
    margin: 0 auto;
    background: #fff;
  }
}

  </style>
</head>
<body>
  <div class="app">
    <section id="homeScreen" class="screen active">
      <div class="topbar">
        <div class="topbar-left">
          <button class="icon-btn" type="button">☰</button>
        </div>
        <div class="topbar-title">Movies</div>
        <div class="topbar-right">
          <button class="icon-btn" type="button">♡</button>
        </div>
      </div><div class="home-wrap">
    <input id="searchInput" class="search" type="text" placeholder="Search movie title..." />
    <div id="movieGrid" class="grid"></div>
    <div id="emptyState" class="empty">No movies found.</div>
  </div>
</section>

<section id="detailScreen" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <button id="backBtn" class="icon-btn" type="button">←</button>
    </div>
    <div id="detailTopTitle" class="topbar-title">Movie</div>
    <div class="topbar-right">
      <button class="icon-btn" type="button">♡</button>
      <button class="icon-btn" type="button">⤴</button>
    </div>
  </div>

  <div class="detail-wrap">
    <div class="hero">
      <img id="detailPoster" src="" alt="poster" />
      <button id="heroPlayBtn" class="play-overlay" type="button">▶</button>
      <div id="durationBadge" class="duration-badge">40:00</div>
    </div>

    <div class="detail-card">
      <h1 id="detailTitle" class="detail-title">Movie Title</h1>
      <div id="detailMeta" class="detail-meta"></div>

      <div class="btn-col">
        <a id="downloadBtn" class="action-btn" href="#" target="_blank" rel="noopener noreferrer">Download</a>
        <button id="watchBtn" class="action-btn" type="button">Watch</button>
      </div>

      <div id="detailDesc" class="desc"></div>
      <div class="hint">m3u8 / mp4 link တချို့မှာ source ဘက်က CORS သို့ hotlink block လုပ်ထားရင် browser player မဖွင့်နိုင်တာရှိနိုင်တယ်။</div>
    </div>
  </div>
</section>

  </div>  <div id="playerSheet" class="player-sheet">
    <div class="player-box">
      <button id="playerCloseBtn" class="player-close" type="button">×</button>
      <video id="videoPlayer" controls playsinline preload="metadata"></video>
    </div>
  </div>  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>  <script>
    const homeScreen = document.getElementById('homeScreen');
    const detailScreen = document.getElementById('detailScreen');
    const movieGrid = document.getElementById('movieGrid');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');

    const detailTopTitle = document.getElementById('detailTopTitle');
    const detailPoster = document.getElementById('detailPoster');
    const detailTitle = document.getElementById('detailTitle');
    const detailMeta = document.getElementById('detailMeta');
    const detailDesc = document.getElementById('detailDesc');
    const durationBadge = document.getElementById('durationBadge');
    const downloadBtn = document.getElementById('downloadBtn');
    const watchBtn = document.getElementById('watchBtn');
    const backBtn = document.getElementById('backBtn');
    const heroPlayBtn = document.getElementById('heroPlayBtn');

    const playerSheet = document.getElementById('playerSheet');
    const playerCloseBtn = document.getElementById('playerCloseBtn');
    const videoPlayer = document.getElementById('videoPlayer');

    let allMovies = [];
    let currentMovie = null;
    let currentHls = null;

    async function loadMovies() {
      try {
        const res = await fetch('/movies.json?v=' + Date.now(), { cache: 'no-store' });
        const raw = await res.text();
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = JSON.parse(raw);
        if (!Array.isArray(data)) throw new Error('movies.json must be an array');
        allMovies = data;
        renderMovies(allMovies);
      } catch (err) {
        console.error(err);
        emptyState.style.display = 'block';
        emptyState.textContent = 'movies.json error: ' + err.message;
      }
    }

    function renderMovies(list) {
      movieGrid.innerHTML = '';
      if (!list.length) {
        emptyState.style.display = 'block';
        return;
      }
      emptyState.style.display = 'none';

      list.forEach(movie => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <img src="${escapeHtml(movie.poster || '')}" alt="${escapeHtml(movie.title || '')}">
          <div class="card-body">
            <h3 class="card-title">${escapeHtml(movie.title || '')}</h3>
            <div class="card-meta">${buildCardMeta(movie)}</div>
          </div>
        `;
        card.addEventListener('click', () => openDetail(movie));
        movieGrid.appendChild(card);
      });
    }

    function buildCardMeta(movie) {
      const year = movie.year || '';
      const genre = movie.genre || '';
      return [year, genre].filter(Boolean).join(' • ');
    }

    function openDetail(movie) {
      currentMovie = movie;
      detailTopTitle.textContent = movie.category || 'Chinese';
      detailPoster.src = movie.cover || movie.poster || '';
      detailPoster.alt = movie.title || 'poster';
      detailTitle.textContent = movie.title || '';
      detailMeta.innerHTML = buildDetailMeta(movie);
      detailDesc.textContent = movie.description || '';
      durationBadge.textContent = movie.duration || '40:00';
      downloadBtn.href = movie.download || movie.stream || '#';

      homeScreen.classList.remove('active');
      detailScreen.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function buildDetailMeta(movie) {
      const parts = [];
      if (movie.timeAgo) parts.push(escapeHtml(movie.timeAgo));
      if (movie.size) parts.push(escapeHtml(movie.size));
      if (!parts.length) {
        if (movie.year) parts.push(escapeHtml(movie.year));
        if (movie.genre) parts.push(escapeHtml(movie.genre));
      }
      return parts.join('<span class="dot">•</span>');
    }

    function goHome() {
      detailScreen.classList.remove('active');
      homeScreen.classList.add('active');
      closePlayer();
    }

    function destroyPlayer() {
      if (currentHls) {
        currentHls.destroy();
        currentHls = null;
      }
      videoPlayer.pause();
      videoPlayer.removeAttribute('src');
      videoPlayer.load();
    }

    function openPlayer(url) {
      if (!url) return;
      destroyPlayer();
      const lower = url.toLowerCase();
      const isM3U8 = lower.includes('.m3u8');

      if (isM3U8) {
        if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
          videoPlayer.src = url;
        } else if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          currentHls.loadSource(url);
          currentHls.attachMedia(videoPlayer);
        } else {
          alert('ဒီ browser က m3u8 မထောက်ပံ့ဘူး။');
          return;
        }
      } else {
        videoPlayer.src = url;
      }

      playerSheet.classList.add('show');
      document.body.style.overflow = 'hidden';
      setTimeout(() => {
        videoPlayer.play().catch(() => {});
      }, 150);
    }

    function closePlayer() {
      playerSheet.classList.remove('show');
      document.body.style.overflow = '';
      destroyPlayer();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = allMovies.filter(movie =>
        (movie.title || '').toLowerCase().includes(q)
      );
      renderMovies(filtered);
    });

    backBtn.addEventListener('click', goHome);
    watchBtn.addEventListener('click', () => openPlayer((currentMovie && currentMovie.stream) || ''));
    heroPlayBtn.addEventListener('click', () => openPlayer((currentMovie && currentMovie.stream) || ''));
    playerCloseBtn.addEventListener('click', closePlayer);
    playerSheet.addEventListener('click', (e) => {
      if (e.target === playerSheet) closePlayer();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && playerSheet.classList.contains('show')) {
        closePlayer();
      } else if (e.key === 'Escape' && detailScreen.classList.contains('active')) {
        goHome();
      }
    });

    loadMovies();
  </script></body>
</html>
