<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Demo Website</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071226;
      color: #e5e7eb;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      color: #fff;
    }

    .sub {
      margin-top: 8px;
      color: #94a3b8;
      font-size: 15px;
    }

    .search {
      width: 100%;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #22314d;
      background: #0b1830;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .card {
      background: #0b1830;
      border: 1px solid #1c2a42;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #3b82f6;
    }

    .poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      display: block;
      background: #111827;
    }

    .card-body {
      padding: 10px;
    }

    .movie-name {
      margin: 0;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
      color: #fff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 36px;
    }

    .small {
      margin-top: 6px;
      color: #94a3b8;
      font-size: 11px;
      line-height: 1.4;
    }

    .empty {
      display: none;
      text-align: center;
      color: #94a3b8;
      padding: 30px 10px;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(0,0,0,.75);
      z-index: 999;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 920px;
      max-height: 92vh;
      overflow: auto;
      background: #08111f;
      border: 1px solid #1f2c43;
      border-radius: 18px;
      position: relative;
    }

    .close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: #0f172a;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      z-index: 2;
    }

    .modal-content {
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 18px;
      padding: 18px;
    }

    .modal-poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 14px;
      background: #111827;
    }

    .modal-title {
      margin: 0 0 8px;
      color: #fff;
      font-size: 24px;
      line-height: 1.3;
    }

    .desc {
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1.65;
      margin: 14px 0;
    }

    .player-wrap {
      margin-top: 12px;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      border: 1px solid #1f2937;
    }

    video {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-secondary {
      background: transparent;
      color: #e5e7eb;
      border-color: #334155;
    }

    .notice {
      margin-top: 10px;
      color: #94a3b8;
      font-size: 12px;
      line-height: 1.5;
    }

    @media (min-width: 721px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 18px;
      }

      .card-body {
        padding: 12px;
      }

      .movie-name {
        font-size: 15px;
        min-height: 42px;
      }

      .small {
        font-size: 13px;
      }
    }

    @media (max-width: 720px) {
      .title {
        font-size: 24px;
      }

      .modal-content {
        grid-template-columns: 1fr;
      }

      .modal-poster {
        max-width: 220px;
      }

      .modal-poster-wrap {
        display: flex;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1 class="title">Movie Demo Website</h1>
      <div class="sub">Cloudflare Pages static + movies.json + browser player</div>
      <input id="searchInput" class="search" type="text" placeholder="Search movie title..." />
    </div>

    <div id="movieGrid" class="grid"></div>
    <div id="emptyState" class="empty">No movies found.</div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-box">
      <button id="closeBtn" class="close">×</button>

      <div class="modal-content">
        <div class="modal-poster-wrap">
          <img id="modalPoster" class="modal-poster" src="" alt="poster" />
        </div>

        <div>
          <h2 id="modalTitle" class="modal-title"></h2>
          <div id="modalMeta" class="small"></div>
          <div id="modalDesc" class="desc"></div>

          <div class="player-wrap">
            <video id="videoPlayer" controls playsinline preload="metadata"></video>
          </div>

          <div class="actions">
            <a id="streamBtn" class="btn btn-primary" href="#" target="_blank" rel="noopener noreferrer">Open Stream Link</a>
            <a id="downloadBtn" class="btn btn-secondary" href="#" target="_blank" rel="noopener noreferrer">Download</a>
          </div>

          <div class="notice">
            mp4 link ဆို browser player နဲ့ တန်းဖွင့်နိုင်တယ်။<br>
            m3u8 link ဆို HLS support ရှိရင် ဖွင့်မယ်။ source server က CORS ပိတ်ထားရင် မဖွင့်နိုင်ဘူး။
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const movieGrid = document.getElementById('movieGrid');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');

    const modal = document.getElementById('modal');
    const closeBtn = document.getElementById('closeBtn');
    const modalPoster = document.getElementById('modalPoster');
    const modalTitle = document.getElementById('modalTitle');
    const modalMeta = document.getElementById('modalMeta');
    const modalDesc = document.getElementById('modalDesc');
    const streamBtn = document.getElementById('streamBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const videoPlayer = document.getElementById('videoPlayer');

    let allMovies = [];
    let currentHls = null;

    async function loadMovies() {
      try {
        const res = await fetch('./movies.json');
        if (!res.ok) throw new Error('movies.json load failed');
        allMovies = await res.json();
        renderMovies(allMovies);
      } catch (err) {
        console.error(err);
        emptyState.style.display = 'block';
        emptyState.textContent = 'movies.json load failed.';
      }
    }

    function renderMovies(list) {
      movieGrid.innerHTML = '';

      if (!list.length) {
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      list.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img class="poster" src="${movie.poster || ''}" alt="${escapeHtml(movie.title || '')}">
          <div class="card-body">
            <h3 class="movie-name">${escapeHtml(movie.title || '')}</h3>
            <div class="small">${escapeHtml(movie.year || '')} ${movie.genre ? '• ' + escapeHtml(movie.genre) : ''}</div>
          </div>
        `;
        card.addEventListener('click', () => openMovie(movie));
        movieGrid.appendChild(card);
      });
    }

    function destroyPlayer() {
      if (currentHls) {
        currentHls.destroy();
        currentHls = null;
      }
      videoPlayer.pause();
      videoPlayer.removeAttribute('src');
      videoPlayer.load();
    }

    function setupPlayer(url) {
      destroyPlayer();
      if (!url) return;

      const lower = url.toLowerCase();
      const isM3U8 = lower.includes('.m3u8');

      if (isM3U8) {
        if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
          videoPlayer.src = url;
        } else if (window.Hls && Hls.isSupported()) {
          currentHls = new Hls();
          currentHls.loadSource(url);
          currentHls.attachMedia(videoPlayer);
        } else {
          alert('ဒီ browser က m3u8 မထောက်ပံ့ဘူး။');
        }
      } else {
        videoPlayer.src = url;
      }
    }

    function openMovie(movie) {
      modalPoster.src = movie.poster || '';
      modalPoster.alt = movie.title || 'poster';
      modalTitle.textContent = movie.title || '';
      modalMeta.textContent = [movie.year, movie.genre].filter(Boolean).join(' • ');
      modalDesc.textContent = movie.description || '';

      streamBtn.href = movie.stream || '#';
      downloadBtn.href = movie.download || movie.stream || '#';

      setupPlayer(movie.stream || '');

      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeMovie() {
      modal.classList.remove('show');
      document.body.style.overflow = '';
      destroyPlayer();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = allMovies.filter(movie =>
        (movie.title || '').toLowerCase().includes(q)
      );
      renderMovies(filtered);
    });

    closeBtn.addEventListener('click', closeMovie);

    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeMovie();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeMovie();
    });

    loadMovies();
  </script>
</body>
</html>
